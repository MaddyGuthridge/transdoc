# Publish a Python package to PyPi using uv
name: Publish Package on PyPi

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Pinned Python version
          python-version-file: ".python-version"
      - name: Extract Package Name
        id: extract
        run: |
          # Extracts "transdoc" from a release tag named "transdoc@v1.2.3"
          TAG=${{ github.event.release.tag_name }}
          PKG_NAME=$(echo "$TAG" | cut -d'@' -f1)

          # Ensure the project exists. If $PKG_NAME not in workspace list, then
          # the tag is invalid
          uv workspace list | grep $PKG_NAME

          echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT

      - name: Build package
        run: uv build
      - name: Publish package
        # Specifically, we are publishing the package whose name we extracted 
        # earlier
        run: uv publish --project ${{ steps.extract.outputs.pkg_name }} -t ${{ secrets.PYPI_API_TOKEN }}
